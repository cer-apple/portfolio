{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tatsuki Okonogi — Portfolio{% endblock %}</title>

    <meta name="description" content="{% block meta_description %}Portfolio of Tatsuki Okonogi — Dual Degree MBA-MSIS candidate at Baylor University, joining Hitachi as AI Strategy Staff. Background across GitLab, Oracle, and Fujitsu.{% endblock %}">
    <meta name="author" content="Tatsuki Okonogi">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Tatsuki Okonogi — Portfolio{% endblock %}">
    <meta property="og:description" content="{% block og_description %}MBA-MSIS candidate. Formerly GitLab, Oracle, Fujitsu. Joining Hitachi as AI Strategy Staff.{% endblock %}">
    <meta property="og:image" content="{% static 'main/images/portrait.jpg' %}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Tatsuki Okonogi — Portfolio{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}MBA-MSIS candidate. Formerly GitLab, Oracle, Fujitsu. Joining Hitachi as AI Strategy Staff.{% endblock %}">
    <meta name="twitter:image" content="{% static 'main/images/portrait.jpg' %}">

    <link rel="icon" type="image/svg+xml" href="{% static 'main/images/favicon.svg' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>
    {% with active=request.resolver_match.url_name %}
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="{% url 'top' %}" class="nav-link{% if active == 'top' %} active{% endif %}">TOP</a></li>
                <li><a href="{% url 'profile' %}" class="nav-link{% if active == 'profile' %} active{% endif %}">PROFILE</a></li>
                <li><a href="{% url 'education' %}" class="nav-link{% if active == 'education' %} active{% endif %}">EDUCATION</a></li>
                <li><a href="{% url 'work' %}" class="nav-link{% if active == 'work' %} active{% endif %}">WORK</a></li>
                <li><a href="{% url 'hobby' %}" class="nav-link{% if active == 'hobby' %} active{% endif %}">HOBBY</a></li>
                <li><a href="{% url 'contact' %}" class="nav-link{% if active == 'contact' %} active{% endif %}">CONTACT</a></li>
            </ul>
        </div>
    </nav>
    {% endwith %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
