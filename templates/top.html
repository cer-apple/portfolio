{% extends "base.html" %}
{% load static %}
{% load i18n %}

{% block title %}{% trans "Home" %} - {% trans "Portfolio" %}{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <div class="hero-image">
            <img src="{% static 'main/images/portrait.jpg' %}" alt="Portrait" class="portrait">
        </div>
        <div class="hero-text">
            <h1 class="hero-title">{% trans "WELCOME" %}</h1>
            <p class="hero-subtitle">{% trans "Unleashing human potential — for companies, professionals, and children — through AI" %}</p>
        </div>
    </div>
</section>
{% endblock %}
