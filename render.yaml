databases:
  - name: tatsuki-portfolio-db
    databaseName: portfolio
    user: portfolio
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: tatsuki-portfolio
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: tatsuki-portfolio-db
          property: connectionString
